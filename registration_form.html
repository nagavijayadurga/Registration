<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registraton Form</title>
</head>
<body>
    <h2>User Registration</h2>
    <form action="/submit-registration" method="post" id="registrationform">
        <div>
            <label for="firstname">First Name :</label>
            <input type="text" id="firstname" name="firstname" placeholder="Enter your First Name" autofocus required><br><br>
        </div>

        <div>
            <label for="lastname">Last Name :</label>
            <input type="text" id="lastname" name="lastname" placeholder="Enter Last name" required><br><br>
        </div>

        <div>
            <label for="email">Email :</label>
            <input type="email" id="email" name="user_email" placeholder="Enter email" required><br><br>
        </div>

        <div>
            <label for="password">Password :</label>
            <input type="password" id="password" name="user_password" placeholder="enter ur password" required><br><br>
        </div>

        <button type="submit">Register</button>
        <button type="submit" formaction="/save-draft">Save as Draft</button>

    </form>
</body>
</html>
